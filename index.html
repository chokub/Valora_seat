<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Valora Cafe Seat Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Staff Seat Map</p>
          <h1>Valora Cafe</h1>
        </div>
        <button class="reset-button" type="button" id="resetAll">Reset all</button>
      </header>

      <section class="status-panel" aria-label="Seat status summary">
        <div class="status-pill">
          <span class="dot available"></span>
          <span>Available</span>
          <strong id="availableCount">0</strong>
        </div>
        <div class="status-pill">
          <span class="dot occupied"></span>
          <span>Occupied</span>
          <strong id="occupiedCount">0</strong>
        </div>
      </section>

      <section class="floor-card" aria-label="Clickable cafe floor plan">
        <div class="floor-card-header">
          <div class="floor-card-label" id="floorLabel">3rd floor seats</div>
          <div class="floor-switch" aria-label="Select cafe floor">
            <button class="floor-button" type="button" data-floor-target="1">1F</button>
            <button class="floor-button" type="button" data-floor-target="2">2F</button>
            <button class="floor-button active" type="button" data-floor-target="3">3F</button>
          </div>
        </div>

        <div class="floor-plan floor-plan-3 active" data-floor="3">
          <div class="vip-room"><span>VIP Room</span></div>

          <div class="table table-left-pair table-14-13">
            <span>14</span>
            <span>13</span>
          </div>
          <div class="table table-left-pair table-12-11">
            <span>12</span>
            <span>11</span>
          </div>

          <div class="table table-bottom-long table-9-10">
            <span>9</span>
            <span>10</span>
          </div>

          <div class="table table-mid table-8">8</div>
          <div class="table table-mid table-7">7</div>
          <div class="table table-mid table-6">6</div>
          <div class="table table-mid table-5">5</div>

          <div class="table table-wide table-4">4</div>
          <div class="table table-wide table-3">3</div>
          <div class="table table-wide table-2">2</div>
          <div class="table table-wide table-1">1</div>

          <div class="bar-accent" aria-hidden="true"></div>
          <div class="seats-layer" data-floor-layer="3"></div>
          <div class="divider divider-4"></div>
          <div class="divider divider-3"></div>
          <div class="divider divider-2"></div>
          <div class="divider divider-1"></div>
          <div class="counter-line line-8"></div>
          <div class="counter-line line-7"></div>
          <div class="counter-line line-6"></div>
        </div>

        <div class="floor-plan floor-plan-1" data-floor="1">
          <div class="floor-1-counter" aria-hidden="true"></div>
          <div class="floor-1-bar-station" aria-hidden="true"></div>

          <div class="floor-1-table floor-1-table-a"></div>
          <div class="floor-1-table floor-1-table-b"></div>

          <div class="floor-1-bottom-wall" aria-hidden="true"></div>
          <div class="floor-1-wall" aria-hidden="true"></div>
          <div class="floor-1-door" aria-hidden="true">
            <svg viewBox="0 0 120 64" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M14 58H106" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" />
              <path d="M14 58V18" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" />
              <path d="M106 58V18" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" />
              <path
                d="M14 18A46 46 0 0 1 60 58"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              />
              <path
                d="M106 18A46 46 0 0 0 60 58"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
              />
            </svg>
          </div>

          <div class="round-table floor-1-round-table" aria-hidden="true"></div>

          <div class="seats-layer" data-floor-layer="1"></div>
        </div>

        <div class="floor-plan floor-plan-2" data-floor="2">
          <div class="floor-2-table floor-2-table-a"></div>
          <div class="floor-2-table floor-2-table-b"></div>

          <div class="floor-2-wall wall-upper"></div>
          <div class="floor-2-wall wall-lower"></div>

          <div class="round-table round-table-left"></div>
          <div class="round-table round-table-right"></div>

          <div class="seats-layer" data-floor-layer="2"></div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
